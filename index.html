<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Body Atlas</title>
    <style>
        :root {
            --panel-bg: rgba(18, 20, 32, 0.92);
            --panel-border: rgba(255, 255, 255, 0.12);
            --text: #f4f7ff;
            --muted: #aab6d3;
            --accent: #7eb6ff;
            --danger: #ee6d71;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: var(--text);
        }

        button,
        input,
        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            padding: 8px 10px;
        }

        button {
            cursor: pointer;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 12px;
            border-radius: 8px;
            z-index: 100;
            max-width: 420px;
        }

        .panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            padding: 14px;
            z-index: 120;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
        }

        .panel-left {
            left: 20px;
            right: auto;
            top: 84px;
            width: 420px;
        }

        h3 {
            margin: 0 0 12px;
            color: var(--accent);
        }

        .field-row {
            margin-bottom: 10px;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row>* {
            flex: 1;
        }

        .field-grid3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .group-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 7px 0;
            padding: 4px 0;
        }

        .group-row input {
            width: auto;
        }

        .marker-table {
            display: grid;
            gap: 8px;
            max-height: 260px;
            overflow: auto;
        }

        .marker-row {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.09);
            background: rgba(255, 255, 255, 0.04);
        }

        .small-note,
        .empty-note {
            font-size: 12px;
            color: var(--muted);
        }

        .compact-row {
            margin-top: 8px;
        }

        .marker-row {
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .marker-row:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .marker-row.selected {
            background: rgba(126, 182, 255, 0.2);
            border-left: 3px solid #7eb6ff;
        }
    </style>
</head>

<body>
    <div id="info">Loading scene...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.183.2/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.183.2/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="main.js"></script>
</body>

</html>
