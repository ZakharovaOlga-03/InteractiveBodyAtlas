<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <title>Three.js GLB + CSV список</title>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/"
      }
    }
  </script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      font-family: sans-serif;
    }

    body {
      display: flex;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      height: 100vh;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #sidebar {
      width: 300px;
      min-width: 300px;
      height: 100vh;
      background: #1a1a2e;
      color: #ccc;
      display: flex;
      flex-direction: column;
      font-size: 13px;
    }

    #sidebar h3 {
      margin: 0;
      padding: 10px 16px;
      background: #16213e;
      color: white;
      font-size: 14px;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    .toolbar {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 7px 10px;
      border-bottom: 1px solid #2a2a4e;
      flex-shrink: 0;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* скрытые input'ы */
    #glbInput,
    #csvInput {
      display: none;
    }

    .file-btn {
      flex: 1;
      padding: 5px 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #aaa;
      border: 1px solid transparent;
      border-radius: 4px;
      font-size: 11px;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      display: inline-block;
    }

    .file-btn:hover {
      border-color: #3a3a5e;
      color: white;
    }

    .file-btn.loaded {
      color: #6abf6a;
      border-color: #2a4a2a;
    }

    .save-btn {
      padding: 5px 10px;
      background: #1a3a1a;
      color: #5abf5a;
      border: 1px solid #2a4a2a;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .save-btn:hover {
      background: #2a4a2a;
      color: #8afa8a;
    }

    .save-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .toolbar input[type=text] {
      padding: 5px 8px;
      border-radius: 4px;
      border: 1px solid #333;
      background: #11112a;
      color: white;
      font-size: 12px;
      outline: none;
      width: 100%;
      box-sizing: border-box;
    }

    .toolbar input[type=text]::placeholder {
      color: #555;
    }

    #sidebarSections {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #baseSection {
      flex-shrink: 0;
      max-height: 40%;
      overflow-y: auto;
      border-bottom: 2px solid #0a0a18;
    }

    #csvGroupsSection {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .section-header {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      position: sticky;
      top: 0;
      z-index: 2;
      font-size: 11px;
      font-weight: bold;
      border-bottom: 1px solid #2a2a4e;
      flex-shrink: 0;
    }

    #baseSection .section-header {
      background: #0d1a0d;
      color: #5a8a5a;
    }

    #csvGroupsSection .section-header {
      background: #0d0d22;
      color: #6a7aba;
    }

    .section-header span {
      flex: 1;
    }

    .section-header button {
      background: #2a2a4a;
      color: #aaa;
      border: none;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .section-header button:hover {
      background: #3a3a5a;
      color: white;
    }

    .obj-ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: bold;
      border-top: 1px solid #1e1e38;
      cursor: pointer;
      user-select: none;
    }

    .group-header:hover {
      filter: brightness(1.2);
    }

    .base-group .group-header {
      background: #0f1f0f;
      color: #6a9a6a;
    }

    .csv-group .group-header {
      background: #0f0f22;
      color: #7a8aba;
    }

    .group-arrow {
      font-size: 9px;
      transition: transform 0.15s;
      min-width: 10px;
      flex-shrink: 0;
    }

    .group-arrow.open {
      transform: rotate(90deg);
    }

    .group-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .group-children {
      display: none;
    }

    .group-children.open {
      display: block;
    }

    .obj-row {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px 3px 22px;
      border-bottom: 1px solid #161628;
      cursor: pointer;
      transition: background 0.1s;
      font-size: 12px;
    }

    .obj-row:hover {
      background: #2a2a4e;
    }

    .obj-row.selected {
      background: #c0392b;
      color: white;
    }

    .obj-row.not-found {
      opacity: 0.3;
      cursor: default;
    }

    .obj-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .vis-btn {
      min-width: 20px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      border-radius: 3px;
      padding: 1px 2px;
      transition: background 0.1s, opacity 0.1s;
      flex-shrink: 0;
    }

    .vis-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .vis-btn.hidden-obj {
      opacity: 0.2;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #666;
      font-size: 12px;
      padding: 2px 3px;
      border-radius: 3px;
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .icon-btn.danger:hover {
      background: rgba(200, 40, 40, 0.3);
      color: #ff7070;
    }

    .empty-hint {
      padding: 8px 14px;
      color: #555;
      font-size: 11px;
      font-style: italic;
    }

    #contextMenu {
      position: fixed;
      z-index: 1000;
      background: #1e1e38;
      border: 1px solid #3a3a5e;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
      padding: 4px 0;
      min-width: 200px;
      display: none;
    }

    .ctx-item {
      padding: 7px 14px;
      cursor: pointer;
      font-size: 13px;
      color: #ccc;
      transition: background 0.1s;
    }

    .ctx-item:hover {
      background: #2a2a4e;
      color: white;
    }

    .ctx-separator {
      height: 1px;
      background: #2a2a4e;
      margin: 3px 0;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0, 0, 0, 0.65);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #1e1e38;
      border: 1px solid #3a3a5e;
      border-radius: 10px;
      padding: 20px;
      min-width: 320px;
      max-width: 460px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      color: #ccc;
    }

    .modal h4 {
      margin: 0 0 14px;
      color: white;
      font-size: 15px;
    }

    .modal-input {
      width: 100%;
      box-sizing: border-box;
      padding: 7px 10px;
      border-radius: 5px;
      border: 1px solid #3a3a5e;
      background: #11112a;
      color: white;
      font-size: 13px;
      outline: none;
      margin-bottom: 10px;
    }

    .modal-input:focus {
      border-color: #5577cc;
    }

    .modal-obj-list {
      max-height: 280px;
      overflow-y: auto;
      border: 1px solid #2a2a4e;
      border-radius: 5px;
      margin-bottom: 12px;
    }

    .modal-obj-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      cursor: pointer;
      border-bottom: 1px solid #1a1a32;
      transition: background 0.1s;
    }

    .modal-obj-item:hover {
      background: #2a2a4e;
    }

    .modal-obj-item input[type=checkbox] {
      cursor: pointer;
      accent-color: #5577cc;
    }

    .modal-obj-item label {
      flex: 1;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pick-item {
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
      color: #ccc;
      border-bottom: 1px solid #1a1a32;
      transition: background 0.1s;
    }

    .pick-item:hover {
      background: #2a2a4e;
      color: white;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn {
      padding: 7px 16px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #2a3a6a;
      color: white;
    }

    .btn-primary:hover {
      background: #3a4a7a;
    }

    .btn-secondary {
      background: #2a2a4a;
      color: #ccc;
    }

    .btn-secondary:hover {
      background: #3a3a5a;
    }

    #info {
      position: absolute;
      z-index: 10;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      border-radius: 6px;
      font-size: 14px;
      display: none;
      white-space: nowrap;
    }

    #debugBox {
      position: absolute;
      z-index: 20;
      top: 10px;
      left: 10px;
      max-width: 420px;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.85);
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      padding: 8px;
      border-radius: 6px;
      display: none;
    }

    #debugBox button {
      display: block;
      margin-top: 5px;
      cursor: pointer;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 3px;
      padding: 2px 8px;
      font-size: 11px;
    }
  </style>
</head>

<body>

  <div id="canvas-container">
    <div id="info">—</div>
    <div id="debugBox"></div>
  </div>

  <!-- контекстное меню -->
  <div id="contextMenu">
    <div class="ctx-item" id="ctxAddToGroup">➕ Добавить в группу...</div>
    <div class="ctx-item" id="ctxCreateAndAdd">🆕 Создать группу с этим объектом</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" id="ctxHide">👁 Скрыть / показать</div>
  </div>

  <!-- модал: название -->
  <div class="modal-overlay" id="modalName">
    <div class="modal">
      <h4 id="modalNameTitle">Создать группу</h4>
      <input type="text" class="modal-input" id="modalNameInput" placeholder="Название группы..." />
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modalNameCancel">Отмена</button>
        <button class="btn btn-primary" id="modalNameOk">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- модал: добавить объекты -->
  <div class="modal-overlay" id="modalAddObjects">
    <div class="modal">
      <h4 id="modalAddTitle">Добавить объекты</h4>
      <input type="text" class="modal-input" id="modalAddSearch" placeholder="🔍 Поиск..." />
      <div class="modal-obj-list" id="modalObjList"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modalAddCancel">Отмена</button>
        <button class="btn btn-primary" id="modalAddOk">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- модал: выбрать группу -->
  <div class="modal-overlay" id="modalPickGroup">
    <div class="modal">
      <h4>Добавить в группу</h4>
      <div class="modal-obj-list" id="pickGroupList"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modalPickCancel">Отмена</button>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <h3>🧠 Анатомический атлас</h3>
    <div class="toolbar">

      <!-- GLB -->
      <div class="file-row">
        <label class="file-btn" id="glbLabel" for="glbInput">📦 Загрузить модель (.glb)</label>
        <input id="glbInput" type="file" accept=".gltf,.glb" />
      </div>

      <!-- CSV -->
      <div class="file-row">
        <label class="file-btn" id="csvLabel" for="csvInput">📋 Загрузить CSV</label>
        <input id="csvInput" type="file" accept=".csv" />
        <button class="save-btn" id="saveCsvBtn" disabled title="Сохранить CSV">💾 Сохранить</button>
      </div>

      <input type="text" id="searchInput" placeholder="🔍 Поиск по названию..." />
    </div>

    <div id="sidebarSections">
      <div id="baseSection">
        <div class="section-header">
          <span>🔒 База объектов</span>
        </div>
        <ul class="obj-ul" id="baseList"></ul>
      </div>

      <div id="csvGroupsSection">
        <div class="section-header">
          <span>📂 Группы атласа</span>
          <button id="btnCreateGroup">+ Группа</button>
        </div>
        <ul class="obj-ul" id="csvGroupsList"></ul>
      </div>
    </div>
  </div>

  <!-- Библиотека csv-groups встроена ниже, чтобы работало при открытии по file:// (без сервера) -->
  <script>
    (function () {
      const CSV_DELIMITER = ';';
      const SUBGROUP_SUFFIX = '.g';
      function isNumberedGroup(rawName) {
        if (!rawName || typeof rawName !== 'string') return false;
        return /^\d+:/.test(rawName.trim());
      }
      function isEditableSubgroup(rawName) {
        if (!rawName || typeof rawName !== 'string') return false;
        const t = rawName.trim();
        return t.endsWith(SUBGROUP_SUFFIX) && !/^\d+:/.test(t);
      }
      function toDisplayName(raw) {
        if (!raw) return '';
        return String(raw).replace(/_/g, ' ').replace(/\.g$/i, '').trim();
      }
      function toRawName(displayName, isSubgroup) {
        if (isSubgroup === undefined) isSubgroup = false;
        if (!displayName) return '';
        const base = String(displayName).trim().replace(/\s+/g, '_');
        return isSubgroup ? (base.endsWith(SUBGROUP_SUFFIX) ? base : base + SUBGROUP_SUFFIX) : base;
      }
      function parseCSVLine(line) {
        const t = line.trim();
        if (!t) return null;
        const parts = t.split(CSV_DELIMITER);
        const rawName = (parts[0] || '').replace(/\uFEFF/g, '').trim();
        if (!rawName) return null;
        const items = parts.slice(2).map(function (p) { return p.trim(); }).filter(Boolean);
        const numbered = isNumberedGroup(rawName);
        const editable = isEditableSubgroup(rawName);
        const groupName = toDisplayName(rawName.replace(/\.g$/i, ''));
        return { rawName: rawName, groupName: groupName, items: items, numbered: numbered, editable: editable };
      }
      function parseCSV(text) {
        const baseGroups = [];
        const subgroups = [];
        const rawText = (text || '').replace(/^\uFEFF/, '');
        const lines = rawText.split(/\r?\n/);
        for (let i = 0; i < lines.length; i++) {
          const row = parseCSVLine(lines[i]);
          if (!row) continue;
          if (row.numbered) baseGroups.push(Object.assign({}, row));
          else if (row.editable) subgroups.push(Object.assign({}, row));
        }
        return { baseGroups: baseGroups, subgroups: subgroups };
      }
      function serializeCSV(data) {
        const lines = [];
        const baseGroups = data.baseGroups || [];
        const subgroups = data.subgroups || [];
        for (let i = 0; i < baseGroups.length; i++) {
          const g = baseGroups[i];
          lines.push([g.rawName, ''].concat(g.items || []).join(CSV_DELIMITER));
        }
        for (let i = 0; i < subgroups.length; i++) {
          const g = subgroups[i];
          const raw = g.rawName || toRawName(g.groupName, true);
          lines.push([raw, ''].concat(g.items || []).join(CSV_DELIMITER));
        }
        return lines.join('\r\n');
      }
      class CSVGroupsManager {
        constructor() {
          this.baseGroups = [];
          this.subgroups = [];
          this.fileName = 'atlas.csv';
          this.visibilityByItem = new Map();
          this.visibilityByGroup = new Map();
        }
        loadFromText(text, fileName) {
          const parsed = parseCSV(text);
          this.baseGroups = parsed.baseGroups;
          this.subgroups = parsed.subgroups;
          if (fileName) this.fileName = fileName;
        }
        loadFromFile(file) {
          var self = this;
          if (!file) return Promise.resolve(false);
          return new Promise(function (resolve) {
            const reader = new FileReader();
            reader.onload = function (ev) {
              try {
                self.loadFromText(ev.target.result, file.name);
                resolve(true);
              } catch (err) {
                console.error('CSV load error:', err);
                resolve(false);
              }
            };
            reader.onerror = function () { resolve(false); };
            reader.readAsText(file, 'UTF-8');
          });
        }
        getAllGroups() {
          const list = [];
          this.baseGroups.forEach(function (g) { list.push(Object.assign({}, g, { type: 'base' })); });
          this.subgroups.forEach(function (g) { list.push(Object.assign({}, g, { type: 'subgroup' })); });
          return list;
        }
        getAllItems() {
          const set = new Set();
          this.baseGroups.concat(this.subgroups).forEach(function (g) {
            (g.items || []).forEach(function (name) { set.add(name); });
          });
          return Array.from(set);
        }
        canEditGroup(group) {
          if (group.type === 'base' || group.numbered) return false;
          return group.editable === true || (group.rawName && isEditableSubgroup(group.rawName));
        }
        canDeleteGroup(group) { return this.canEditGroup(group); }
        canAddSubgroup() { return true; }
        addSubgroup(groupName, items) {
          if (items === undefined) items = [];
          const name = (groupName || '').trim();
          if (!name) return { success: false, error: 'Название не задано' };
          const rawName = toRawName(name, true);
          const displayName = toDisplayName(rawName);
          if (this.subgroups.some(function (g) { return g.rawName === rawName || (g.groupName && g.groupName === displayName); }))
            return { success: false, error: 'Группа с таким названием уже есть' };
          if (this.baseGroups.some(function (g) { return g.groupName === displayName || toDisplayName(g.rawName) === displayName; }))
            return { success: false, error: 'Группа с таким названием уже есть (базовая группа)' };
          const group = { rawName: rawName, groupName: toDisplayName(rawName), items: Array.isArray(items) ? items.slice() : [], numbered: false, editable: true };
          this.subgroups.push(group);
          return { success: true, group: group };
        }
        editSubgroup(group, newName) {
          const g = this.subgroups.find(function (x) { return x === group; });
          if (!g) return { success: false, error: 'Редактируемая группа не найдена' };
          if (!this.canEditGroup(group)) return { success: false, error: 'Эту группу нельзя редактировать (нумерованные группы защищены)' };
          const name = (newName || '').trim();
          if (!name) return { success: false, error: 'Название не задано' };
          const rawName = toRawName(name, true);
          if (this.subgroups.some(function (x) { return x !== group && (x.rawName === rawName || x.groupName === toDisplayName(rawName)); }))
            return { success: false, error: 'Группа с таким названием уже есть' };
          g.rawName = rawName;
          g.groupName = toDisplayName(rawName);
          return { success: true };
        }
        deleteSubgroup(group) {
          const idx = this.subgroups.findIndex(function (g) { return g === group; });
          if (idx === -1) return { success: false, error: 'Такая группа не найдена' };
          if (!this.canDeleteGroup(group)) return { success: false, error: 'Эту группу нельзя удалить' };
          this.subgroups.splice(idx, 1);
          return { success: true };
        }
        addItemToSubgroup(group, itemName) {
          if (!this.canEditGroup(group)) return { success: false, error: 'Группу нельзя редактировать' };
          const name = (itemName || '').trim();
          if (!name) return { success: false, error: 'Имя элемента не задано' };
          const g = this.subgroups.find(function (x) { return x === group; });
          if (!g) return { success: false, error: 'Группа не найдена' };
          if (!g.items) g.items = [];
          if (g.items.includes(name)) return { success: true };
          g.items.push(name);
          return { success: true };
        }
        removeItemFromSubgroup(group, itemName) {
          if (!this.canEditGroup(group)) return { success: false, error: 'Группу нельзя редактировать' };
          const g = this.subgroups.find(function (x) { return x === group; });
          if (!g) return { success: false, error: 'Группа не найдена' };
          if (!g.items) return { success: true };
          g.items = g.items.filter(function (n) { return n !== itemName; });
          return { success: true };
        }
        setItemVisibility(itemName, visible) {

  <script type="module">

    // ==================== THREE ====================
    const scene = new THREE.Scene();

    scene.add(new THREE.AmbientLight(0xffffff, 1));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(1, 1, 1),
      new THREE.MeshStandardMaterial({ color: 0x4488ff })
    );
    scene.add(cube);

    let currentModel = null;
    const objectByName = new Map();
    const loader = new GLTFLoader();
    const debugBox = document.getElementById('debugBox');

    function buildMeshIndex(model) {
      objectByName.clear();
      const names = [];
      model.traverse(c => {
        if (c.name) {
          objectByName.set(c.name.toLowerCase().trim(), c);
          names.push(JSON.stringify(c.name));
        }
      });
      debugBox.style.display = 'block';
      debugBox.innerHTML = `<b>Объектов: ${names.length}. Первые 50:</b><br>` +
        names.slice(0, 50).join('<br>') +
        `<button onclick="this.parentElement.style.display='none'">✕</button>`;
    }

    function csvKey(n) { return n.toLowerCase().trim().replace(/\.([a-z0-9]+)$/, '$1'); }

    function findObject(csvName) {
      const k = csvKey(csvName);
      if (objectByName.has(k)) return objectByName.get(k);
      const u = k.replace(/\s+/g, '_'); if (objectByName.has(u)) return objectByName.get(u);
      const s = k.replace(/_/g, ' '); if (objectByName.has(s)) return objectByName.get(s);
      return null;
    }

    function hideAll(model) { model.traverse(c => c.visible = false); }

    function showWithParents(obj) {
      obj.traverse(c => c.visible = true);
      let p = obj.parent;
      while (p && p !== currentModel) { p.visible = true; p = p.parent; }
      if (currentModel) currentModel.visible = true;
    }

    // ==================== ПОДСВЕТКА ====================
    const infoPanel = document.getElementById('info');
    let selMesh = null, selEmissive = null, selRow = null;

    function getEmissive(m) {
      if (Array.isArray(m.material)) return new THREE.Color(0);
      return m.material.emissive?.clone() || new THREE.Color(0);
    }
    function setEmissive(m, c) {
      if (Array.isArray(m.material)) m.material.forEach(x => x.emissive?.copy(c));
      else m.material.emissive?.copy(c);
    }
    function selectObject(obj, row = null) {
      if (selMesh) setEmissive(selMesh, selEmissive);
      if (selRow) selRow.classList.remove('selected');
      selMesh = null; selRow = null;
      if (!obj) { infoPanel.style.display = 'none'; return; }
      let tm = obj.isMesh ? obj : null;
      if (!tm) obj.traverse(c => { if (c.isMesh && !tm) tm = c; });

    }

    // ==================== CSV: работа через библиотеку csv-groups.js ====================

    let csvLoaded = false;
    const saveCsvBtn = document.getElementById('saveCsvBtn');

    function markDirty() {
      if (csvLoaded) saveCsvBtn.disabled = false;
    }

    // ==================== СОХРАНЕНИЕ (через библиотеку) ====================
    saveCsvBtn.addEventListener('click', () => {

      saveCsvBtn.disabled = true;
      saveCsvBtn.textContent = '✅ Сохранено';

    // Консольный API: scene.show_group("..."), scene.hide_element("..."), scene.load_csv(), и т.д.

    }

      scene,
      findObject,
      getGroupByName,
      csvManager,
      triggerLoadCsv: () => document.getElementById('csvInput').click(),
      triggerLoadModel: () => document.getElementById('glbInput').click(),
    }));
    window.scene = scene;

    // ==================== РЕНДЕР СПИСКОВ ====================
    let allRows = [];

    function buildBaseList() {
      const ul = document.getElementById('baseList');
      ul.innerHTML = '';
      csvManager.getBaseGroups().forEach(g => renderGroup(g, ul, 'base'));
    }

    function buildCsvGroupsList() {
      const ul = document.getElementById('csvGroupsList');
      ul.innerHTML = '';
      const subgroups = csvManager.getSubgroups();
      if (!subgroups.length) {
        const hint = document.createElement('li');
        hint.className = 'empty-hint';
        hint.textContent = 'Нет групп. Нажмите «+ Группа»';

      subgroups.forEach(g => renderGroup(g, ul, 'csv'));
    }

    function mkIconBtn(text, title, danger = false) {
      const b = document.createElement('button');
      b.className = 'icon-btn' + (danger ? ' danger' : '');
      b.textContent = text; b.title = title;
      return b;
    }

    function renderGroup(groupData, parentUl, mode) {
      const li = document.createElement('li');
      li.className = 'group-li ' + (mode === 'base' ? 'base-group' : 'csv-group');

      const header = document.createElement('div');
      header.className = 'group-header';

      const arrow = document.createElement('span'); arrow.className = 'group-arrow'; arrow.textContent = '▸';
      const nameEl = document.createElement('span'); nameEl.className = 'group-name'; nameEl.textContent = groupData.groupName;
      const visBtn = document.createElement('span'); visBtn.className = 'vis-btn hidden-obj'; visBtn.textContent = '👁'; visBtn.title = 'Показать / скрыть';

      header.appendChild(arrow);
      header.appendChild(nameEl);
      header.appendChild(visBtn);

      let addBtn = null, renameBtn = null, delBtn = null;
      if (mode === 'csv') {
        addBtn = mkIconBtn('＋', 'Добавить объекты');
        renameBtn = mkIconBtn('✏', 'Переименовать');
        delBtn = mkIconBtn('🗑', 'Удалить группу', true);
        header.appendChild(addBtn);
        header.appendChild(renameBtn);
        header.appendChild(delBtn);
      }

      li.appendChild(header);
      const childrenDiv = document.createElement('div');
      childrenDiv.className = 'group-children';
      li.appendChild(childrenDiv);
      parentUl.appendChild(li);

      const groupObjs = [];

      function renderItems() {
        childrenDiv.innerHTML = '';
        groupObjs.length = 0;

        if (!groupData.items.length) {
          const h = document.createElement('div');
          h.className = 'empty-hint'; h.textContent = 'Группа пуста';
          childrenDiv.appendChild(h); return;
        }

        groupData.items.forEach(csvName => {
          const obj = findObject(csvName);
          const row = document.createElement('div');
          row.className = 'obj-row' + (obj ? '' : ' not-found');

          const ns = document.createElement('span');
          ns.className = 'obj-name';
          ns.textContent = csvName.replace(/_/g, ' ');
          ns.title = obj ? `Модель: ${obj.name}` : `⚠️ не найден: ${csvName}`;
          row.appendChild(ns);

          const rv = document.createElement('span');
          rv.className = 'vis-btn hidden-obj'; rv.textContent = '👁';
          row.appendChild(rv);

          if (mode === 'csv') {
            const rm = mkIconBtn('✕', 'Убрать из группы', true);

              e.stopPropagation();

              renderItems();

          ns.addEventListener('click', () => { if (obj) selectObject(obj, row); });
          rv.addEventListener('click', e => {

            if (obj.visible) { obj.traverse(c => c.visible = false); rv.classList.add('hidden-obj'); }
            else { showWithParents(obj); rv.classList.remove('hidden-obj'); }

    // ==================== + ГРУППА (через библиотеку) ====================

    function openAddObjectsModal(group, cb) {

    function renderModalObjList(query) {

        if (obj.name && !names.some(n => csvKey(n) === key)) names.push(obj.name);
      });

      openNameModal('Создать группу', '', name => {
        const result = csvManager.addSubgroup(name, [_ctxName]);
        if (result.success) { markDirty(); buildCsvGroupsList(); }
        else if (result.error) alert(result.error);
      });
    });
    document.getElementById('ctxHide').addEventListener('click', () => {
      contextMenu.style.display = 'none';
      if (!_ctxObj) return;
      if (_ctxObj.visible) _ctxObj.traverse(c => c.visible = false);
      else showWithParents(_ctxObj);
    });

    document.addEventListener('click', () => contextMenu.style.display = 'none');
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        contextMenu.style.display = 'none';
        [modalName, modalAddObjects, modalPickGroup].forEach(m => m.classList.remove('open'));
      }
    });

    // ==================== ЗАГРУЗКА GLB ====================
    document.getElementById('glbInput').addEventListener('change', e => {
      const file = e.target.files[0]; if (!file) return;
      document.getElementById('glbLabel').textContent = `📦 ${file.name}`;
      document.getElementById('glbLabel').classList.add('loaded');
      const url = URL.createObjectURL(file);
      loader.load(url, gltf => {
        cube.visible = false;
        if (currentModel) scene.remove(currentModel);
        selectObject(null);
        currentModel = gltf.scene;
        scene.add(currentModel);
        buildMeshIndex(currentModel);
        requestAnimationFrame(() => {
          const box = new THREE.Box3().setFromObject(currentModel);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());
          const md = Math.max(size.x, size.y, size.z);
          camera.position.set(center.x, center.y, center.z + md * 1.2);
          camera.lookAt(center.x, center.y, center.z);
          camera.far = md * 10; camera.updateProjectionMatrix();
          hideAll(currentModel);
          rebuildAllLists();
        });
        URL.revokeObjectURL(url);
      }, undefined, console.error);
    });

    // ==================== ЗАГРУЗКА CSV (через библиотеку) ====================
    document.getElementById('csvInput').addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const ok = await csvManager.loadFromFile(file);
        if (!ok) return;
        allRows = [];
        rebuildAllLists();
        document.getElementById('csvLabel').textContent = `📋 ${csvManager.fileName}`;
        document.getElementById('csvLabel').classList.add('loaded');
        csvLoaded = true;
        saveCsvBtn.disabled = false;
      } catch (err) {
        console.error('Ошибка загрузки CSV:', err);
      }
    });

    function rebuildAllLists() {
      allRows = [];
      buildBaseList();
      buildCsvGroupsList();
    }

    // ==================== ПОИСК ====================
    document.getElementById('searchInput').addEventListener('input', e => {
      const q = e.target.value.toLowerCase().trim();
      allRows.forEach(({ row, csvName }) => {
        const m = !q || csvName.toLowerCase().includes(q) || csvName.replace(/_/g, ' ').toLowerCase().includes(q);
        row.style.display = m ? 'flex' : 'none';
      });
      [document.getElementById('baseList'), document.getElementById('csvGroupsList')].forEach(ul => {
        ul.querySelectorAll('.group-li').forEach(groupLi => {
          const hdr = groupLi.querySelector('.group-header');
          const ch = groupLi.querySelector('.group-children');
          if (!hdr || !ch) return;
          const hasVisible = [...ch.querySelectorAll('.obj-row')].some(r => r.style.display !== 'none');
          hdr.style.display = hasVisible ? 'flex' : 'none';
          if (q && hasVisible) { ch.classList.add('open'); hdr.querySelector('.group-arrow')?.classList.add('open'); }
        });
      });
    });

    // ==================== RAYCASTER ====================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('click', e => {
      if (!currentModel) return;
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(currentModel.children, true);
      if (hits.length) {
        const hit = hits[0].object;
        const found = allRows.find(r => r.obj && (r.obj.id === hit.id || r.obj.id === hit.parent?.id));
        selectObject(hit, found?.row || null);
      } else selectObject(null);
    });

    renderer.domElement.addEventListener('contextmenu', e => {
      e.preventDefault(); if (!currentModel) return;
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(currentModel.children, true);
      if (hits.length) {
        const hit = hits[0].object;
        const found = allRows.find(r => r.obj && (r.obj.id === hit.id || r.obj.id === hit.parent?.id));
        showContextMenu(e, found?.csvName || hit.name, hit);
      }
    });

    // ==================== АНИМАЦИЯ ====================
    function animate() {
      requestAnimationFrame(animate);
      if (currentModel) currentModel.rotation.y += 0.01;
      else { cube.rotation.x += 0.01; cube.rotation.y += 0.015; }
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      const w = container.clientWidth, h = container.clientHeight;
      camera.aspect = w / h; camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });
  </script>
    <script type="text/atlas-script" data-csv="visible_groups.csv" data-model1="models/1-5.glb"
    data-model2="models/6-9.glb">
  scene.show_group("1:1:_Skeletal_system");
  scene.show_group("Bones_of_pelvic_girdle.g");
  scene.hide_element("Femur.l");
</script>
