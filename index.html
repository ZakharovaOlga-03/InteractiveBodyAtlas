<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <title>Атлас — только модель</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/"
      }
    }
  </script>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="canvas-container"></div>

  <!-- Библиотека теперь включает всю 3D логику -->
  <script type="module">
  import { AtlasScene } from './AtlasScene.js';

  // Модели лежат на GitHub
  const atlas = new AtlasScene('canvas-container', {
    modelBaseUrl: 'https://cdn.jsdelivr.net/gh/ZakharovaOlga-03/InteractiveBodyAtlas/models/',
    csvBaseUrl: 'https://cdn.jsdelivr.net/gh/ZakharovaOlga-03/InteractiveBodyAtlas/'
  });

  // Или можно загружать конкретные файлы
  await atlas.loadModel1('1-5.glb');  // загрузится с modelBaseUrl
  await atlas.loadModel2('6-9.glb');  // полный URL работает тоже
  await atlas.loadCsv('visible_groups.csv');
  
  window.atlas = atlas;
</script>

<!-- Или через atlas-script -->
<script type="text/atlas-script" 
        data-model-base="https://cdn.jsdelivr.net/gh/ZakharovaOlga-03/InteractiveBodyAtlas/models/"
        data-model1="1-5.glb" 
        data-model2="6-9.glb">
  scene.show_group("1:_Skeletal_system");
</script>
</body>

</html>
